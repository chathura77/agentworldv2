# Include this inside the existing HTTPS server block for sarathchandra.com
# when AgentWorld is deployed at https://sarathchandra.com/agentworld/.
#
# The Docker Compose service binds only to 127.0.0.1, so this reverse proxy is
# the only public entry point.

location = /agentworld {
  return 301 /agentworld/;
}

location ^~ /agentworld/ {
  proxy_pass http://127.0.0.1:18080;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}
