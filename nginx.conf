server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /agentworld {
    return 301 /agentworld/;
  }

  location = /agentworld/agentworld.md {
    alias /usr/share/nginx/html/agentworld.md;
    default_type text/markdown;
  }

  location = /agentworld/site.webmanifest {
    alias /usr/share/nginx/html/site.webmanifest;
    default_type application/manifest+json;
  }

  location = /agentworld.md {
    default_type text/markdown;
  }

  location = /site.webmanifest {
    default_type application/manifest+json;
  }

  location ^~ /agentworld/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location ^~ /agentworld/ {
    rewrite ^/agentworld/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:txt|xml|json|md|webmanifest)$ {
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }
}
